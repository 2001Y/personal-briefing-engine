<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Pulse 全体像</title>
  <desc id="desc">Hermes-first で source-rigorous な briefing pipeline を、AからFまで一直線のステップとして表した日本語SVG図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #cbd5e1; }
      .step { font: 700 20px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #e2e8f0; }
      .label { font: 600 15px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #f8fafc; }
      .small { font: 500 13px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #cbd5e1; }
      .tiny { font: 500 12px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #94a3b8; }
      .box { rx: 24; stroke-width: 2.2; }
      .arrow { stroke: #94a3b8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1920" height="800" fill="url(#bg)"/>
  <rect width="1920" height="800" fill="url(#grid)" opacity="0.4"/>

  <text x="60" y="64" class="title">Hermes Pulse</text>
  <text x="60" y="98" class="subtitle">Hermes-first で、known-source retrieval と expert-depth escalation を含む一直線のパイプラインです。</text>

  <rect x="40" y="140" width="270" height="400" class="box" fill="rgba(8,51,68,0.35)" stroke="#22d3ee"/>
  <text x="62" y="180" class="step">A. トリガーイベント</text>
  <text x="62" y="220" class="label">定期</text>
  <text x="62" y="244" class="small">digest.morning ・ digest.evening</text>
  <text x="62" y="284" class="label">イベント駆動</text>
  <text x="62" y="308" class="small">feed.update ・ leave_now ・ mail.operational</text>
  <text x="62" y="332" class="small">location arrival / dwell</text>
  <text x="62" y="356" class="small">shopping replenishment</text>
  <text x="62" y="456" class="tiny">review.trigger_quality が閾値・source品質・trigger適合を見直す。</text>

  <rect x="350" y="140" width="270" height="400" class="box" fill="rgba(30,41,59,0.42)" stroke="#94a3b8"/>
  <text x="372" y="180" class="step">B. 収集</text>
  <text x="372" y="220" class="label">必要な source だけ集める</text>
  <text x="372" y="250" class="small">運用: Calendar ・ Gmail ・ Notes ・ Maps</text>
  <text x="372" y="274" class="small">会話: Hermes ・ ChatGPT ・ Grok</text>
  <text x="372" y="298" class="small">Feed: 公式blog ・ press ・ changelog</text>
  <text x="372" y="322" class="small">known-source registry を web search より優先</text>
  <text x="372" y="364" class="tiny">原則: 可能なら primary source first。</text>
  <text x="372" y="386" class="tiny">方式: local_store ・ official_api ・ rss_poll ・ search</text>

  <rect x="660" y="140" width="270" height="400" class="box" fill="rgba(6,78,59,0.35)" stroke="#34d399"/>
  <text x="682" y="180" class="step">C. 統合 / ranking</text>
  <text x="682" y="220" class="label">束ねて、順位付けして、検証し、深さを決める</text>
  <text x="682" y="250" class="small">people ・ time ・ place ・ open loops</text>
  <text x="682" y="274" class="small">authority tier ・ citation chain ・ dedupe</text>
  <text x="682" y="316" class="tiny">優先順位: future relevance &gt; people overlap &gt; urgency</text>
  <text x="682" y="338" class="tiny">&gt; explicit intent &gt; authority / primary confirmation</text>
  <text x="682" y="360" class="tiny">&gt; external deltas &gt; passive signals</text>

  <rect x="970" y="140" width="270" height="400" class="box" fill="rgba(76,29,149,0.35)" stroke="#a78bfa"/>
  <text x="992" y="180" class="step">D. 出力生成</text>
  <text x="992" y="220" class="label">いちばん適切な形と深さに整える</text>
  <text x="992" y="252" class="small">digest ・ mini_digest ・ warning ・ nudge</text>
  <text x="992" y="276" class="small">action_prep ・ deep_brief ・ source_audit</text>
  <text x="992" y="392" class="tiny">トピックごとに同じ薄さへ潰さず、</text>
  <text x="992" y="414" class="tiny">必要なら専門家レベルまで深掘る。</text>

  <rect x="1280" y="140" width="270" height="400" class="box" fill="rgba(120,53,15,0.30)" stroke="#fbbf24"/>
  <text x="1302" y="180" class="step">E. 配信 / 実行</text>
  <text x="1302" y="220" class="label">配信するか、実行直前まで進める</text>
  <text x="1302" y="250" class="small">Slack ・ Telegram ・ local files ・ email</text>
  <text x="1302" y="286" class="small">L0 observe ・ L1 suggest</text>
  <text x="1302" y="310" class="small">L2 prepare ・ L3 approve + execute</text>

  <rect x="1590" y="140" width="290" height="400" class="box" fill="rgba(136,19,55,0.35)" stroke="#fb7185"/>
  <text x="1612" y="180" class="step">F. 状態 / audit</text>
  <text x="1612" y="220" class="label">何が起きたかを残す</text>
  <text x="1612" y="250" class="small">connector cursor ・ registry state</text>
  <text x="1612" y="274" class="small">delivery history ・ suppression log</text>
  <text x="1612" y="298" class="small">citation chain ・ trigger run log</text>
  <text x="1612" y="322" class="small">feedback と source-quality review</text>

  <path d="M 310 340 L 350 340" class="arrow"/>
  <path d="M 620 340 L 660 340" class="arrow"/>
  <path d="M 930 340 L 970 340" class="arrow"/>
  <path d="M 1240 340 L 1280 340" class="arrow"/>
  <path d="M 1550 340 L 1590 340" class="arrow"/>

  <rect x="40" y="610" width="1840" height="130" class="box" fill="rgba(15,23,42,0.65)" stroke="#475569"/>
  <text x="64" y="652" class="label">このプロジェクト全体で実現したいこと</text>
  <text x="64" y="682" class="small">Hermes-first の operating briefing pipeline として、通常は簡潔に、必要な時は expert-depth まで深掘りしつつ、primary source・known-source registry・強い provenance に grounded した判断を返す。</text>
  <text x="64" y="708" class="tiny">この図は直列のステップとして読む。Aでtriggerが発生し、Bで最良のsourceを集め、Cで順位付けと検証を行い、Dで適切な深さに整え、Eで配信または実行準備し、Fでstateとauditを記録する。</text>
</svg>
