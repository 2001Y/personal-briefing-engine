<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">personal-briefing-engine 全体像</title>
  <desc id="desc">朝刊夕刊の定期トリガーとイベント駆動トリガーを一つのパイプラインで統合する、個人向け operating briefing engine の日本語要約図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #cbd5e1; }
      .section { font: 700 18px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #e2e8f0; }
      .label { font: 600 16px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #f8fafc; }
      .small { font: 500 13px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #cbd5e1; }
      .tiny { font: 500 12px 'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif; fill: #94a3b8; }
      .box { rx: 20; stroke-width: 2; }
      .card { rx: 18; stroke-width: 2; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
  </defs>
  <rect width="1600" height="1020" fill="url(#bg)"/>
  <rect width="1600" height="1020" fill="url(#grid)" opacity="0.45"/>

  <text x="70" y="70" class="title">personal-briefing-engine</text>
  <text x="70" y="105" class="subtitle">朝刊夕刊の定期ブリーフィングと proactive event trigger を、agent 非依存の 1 本の流れで統合する構想。</text>

  <rect x="60" y="150" width="310" height="330" class="box" fill="rgba(8,51,68,0.35)" stroke="#22d3ee"/>
  <text x="85" y="190" class="section">A. トリガーイベント</text>
  <rect x="85" y="215" width="260" height="65" class="card" fill="#0f172a" stroke="#22d3ee"/>
  <text x="105" y="245" class="label">定期トリガー</text>
  <text x="105" y="268" class="small">digest.morning ・ digest.evening</text>
  <rect x="85" y="295" width="260" height="110" class="card" fill="#0f172a" stroke="#22d3ee"/>
  <text x="105" y="325" class="label">イベント駆動</text>
  <text x="105" y="348" class="small">location.arrival / dwell</text>
  <text x="105" y="370" class="small">calendar.leave_now ・ mail.operational</text>
  <text x="105" y="392" class="small">shopping.replenishment</text>
  <rect x="85" y="420" width="260" height="40" class="card" fill="#0f172a" stroke="#22d3ee"/>
  <text x="105" y="446" class="small">review.trigger_quality</text>

  <rect x="60" y="540" width="310" height="360" class="box" fill="rgba(30,41,59,0.4)" stroke="#94a3b8"/>
  <text x="85" y="580" class="section">B. 情報ソース群</text>
  <rect x="85" y="605" width="260" height="84" class="card" fill="#0f172a" stroke="#94a3b8"/>
  <text x="105" y="635" class="label">運用コンテキスト</text>
  <text x="105" y="658" class="small">Calendar ・ Gmail ・ Notes</text>
  <text x="105" y="680" class="small">Maps ・ Location history</text>
  <rect x="85" y="705" width="260" height="84" class="card" fill="#0f172a" stroke="#94a3b8"/>
  <text x="105" y="735" class="label">会話履歴</text>
  <text x="105" y="758" class="small">Hermes ・ ChatGPT ・ Grok</text>
  <text x="105" y="780" class="small">local / export / share / manual</text>
  <rect x="85" y="805" width="260" height="70" class="card" fill="#0f172a" stroke="#94a3b8"/>
  <text x="105" y="835" class="label">SNS / memory</text>
  <text x="105" y="858" class="small">X timeline ・ bookmarks ・ likes</text>

  <rect x="460" y="170" width="290" height="180" class="box" fill="rgba(6,78,59,0.35)" stroke="#34d399"/>
  <text x="485" y="210" class="section">C. 収集</text>
  <text x="485" y="245" class="label">Acquisition plan</text>
  <text x="485" y="270" class="small">trigger profile に必要な範囲だけ取りに行く</text>
  <text x="485" y="300" class="tiny">local_store ・ official_api ・ official_export</text>
  <text x="485" y="322" class="tiny">share_link_import ・ manual_import ・ browser_automation_experimental</text>

  <rect x="460" y="395" width="290" height="255" class="box" fill="rgba(6,78,59,0.35)" stroke="#34d399"/>
  <text x="485" y="435" class="section">D. 統合 / ranking / suppression</text>
  <text x="485" y="470" class="label">束ねて、順位付けして、ノイズを抑える</text>
  <text x="485" y="495" class="small">people ・ time ・ place ・ open loops</text>
  <text x="485" y="520" class="small">resurfacing ・ quota ・ dedupe</text>
  <text x="485" y="555" class="tiny">優先順位:</text>
  <text x="485" y="577" class="tiny">未来 relevance &gt; people overlap &gt; urgency</text>
  <text x="485" y="599" class="tiny">&gt; saved intent &gt; external deltas &gt; passive signals</text>
  <text x="485" y="630" class="tiny">X 内では bookmark &gt; like &gt; home timeline diff</text>

  <rect x="840" y="170" width="320" height="240" class="box" fill="rgba(76,29,149,0.35)" stroke="#a78bfa"/>
  <text x="865" y="210" class="section">E. 出力生成</text>
  <rect x="865" y="235" width="270" height="50" class="card" fill="#0f172a" stroke="#a78bfa"/>
  <text x="885" y="266" class="label">digest</text>
  <rect x="865" y="295" width="130" height="50" class="card" fill="#0f172a" stroke="#a78bfa"/>
  <text x="885" y="326" class="small">mini_digest</text>
  <rect x="1005" y="295" width="130" height="50" class="card" fill="#0f172a" stroke="#a78bfa"/>
  <text x="1040" y="326" class="small">warning</text>
  <rect x="865" y="355" width="130" height="50" class="card" fill="#0f172a" stroke="#a78bfa"/>
  <text x="910" y="386" class="small">nudge</text>
  <rect x="1005" y="355" width="130" height="50" class="card" fill="#0f172a" stroke="#a78bfa"/>
  <text x="1030" y="386" class="small">action_prep</text>

  <rect x="840" y="455" width="320" height="195" class="box" fill="rgba(120,53,15,0.30)" stroke="#fbbf24"/>
  <text x="865" y="495" class="section">F. 配信 / 実行</text>
  <text x="865" y="530" class="label">Adapter</text>
  <text x="865" y="555" class="small">Slack ・ Telegram ・ local files ・ future app UI</text>
  <text x="865" y="590" class="label">Action level</text>
  <text x="865" y="615" class="small">L0 observe ・ L1 suggest ・ L2 prepare ・ L3 approve+execute</text>

  <rect x="1250" y="230" width="290" height="330" class="box" fill="rgba(136,19,55,0.35)" stroke="#fb7185"/>
  <text x="1275" y="270" class="section">G. 状態 / memory / audit</text>
  <text x="1275" y="305" class="label">SQLite + raw artifact refs</text>
  <text x="1275" y="335" class="small">connector cursor</text>
  <text x="1275" y="360" class="small">delivery history</text>
  <text x="1275" y="385" class="small">suppression log</text>
  <text x="1275" y="410" class="small">approval / action log</text>
  <text x="1275" y="435" class="small">trigger run log</text>
  <text x="1275" y="460" class="small">feedback log</text>
  <text x="1275" y="500" class="tiny">X diff state: last_poll_at ・ last_top_id ・ seen_ids</text>

  <rect x="460" y="720" width="1080" height="210" class="box" fill="rgba(15,23,42,0.65)" stroke="#475569"/>
  <text x="490" y="760" class="section">このプロジェクト全体で実現したいこと</text>
  <text x="490" y="795" class="small">ユーザーの「今」と「次」に向けて、必要な文脈を先回りして再構成する personal operating briefing engine。</text>
  <text x="490" y="830" class="tiny">• 未来の予定と会う人の文脈を、朝刊夕刊だけでなく適切な瞬間に再起する</text>
  <text x="490" y="852" class="tiny">• Gmail / 会話履歴 / saved posts / notes から open loop と follow-up を浮かび上がらせる</text>
  <text x="490" y="874" class="tiny">• 忘れていたが今 relevant な bookmark / like / memory を resurfacing する</text>
  <text x="930" y="830" class="tiny">• Hermes / ChatGPT / Grok をまたいだ multi-agent memory を扱う</text>
  <text x="930" y="852" class="tiny">• X は重要だが支配的にはせず、 relevance と quota で丁寧に扱う</text>
  <text x="930" y="874" class="tiny">• 朝夕の定期 digest だけでなく、arrival / leave-now / mail / replenishment でも動く</text>

  <path d="M 370 315 C 410 315, 420 260, 460 260" class="arrow"/>
  <path d="M 370 720 C 410 720, 420 520, 460 520" class="arrow"/>
  <path d="M 750 260 C 790 260, 800 290, 840 290" class="arrow"/>
  <path d="M 750 520 C 790 520, 800 550, 840 550" class="arrow"/>
  <path d="M 1160 290 C 1200 290, 1210 340, 1250 340" class="arrow"/>
  <path d="M 1160 550 C 1200 550, 1210 500, 1250 500" class="arrow dashed"/>

  <text x="70" y="975" class="tiny">定期トリガーとイベント駆動トリガーは別エンジンではなく同じパイプラインを共有し、変わるのは trigger profile・取得範囲・ranking weight・quota・output contract だけです。</text>
</svg>
